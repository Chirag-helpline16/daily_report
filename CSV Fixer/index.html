<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Fixer</title>
    <meta name="description" content="Intelligently fix corrupted CSV files with misaligned columns.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <header>
            <h1>CSV <span>Fixer</span></h1>
            <p>Upload your corrupted CSV file. We'll automatically fix misplaced commas and realign your data columns.
            </p>
        </header>

        <main>
            <div class="upload-card" id="drop-zone">
                <div class="upload-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                </div>
                <h3>Drag & Drop your CSV here</h3>
                <p>or</p>
                <label for="file-input" class="btn-primary">Browse Files</label>
                <input type="file" id="file-input" accept=".csv" hidden>
            </div>

            <div class="status-container hidden" id="status-container">
                <div class="status-icon" id="status-icon">
                    <!-- Dynamic icon -->
                </div>
                <h3 id="status-title">Processing...</h3>
                <p id="status-message">Analyzing and fixing your CSV structure.</p>

                <div class="progress-bar hidden" id="progress-bar">
                    <div class="progress-fill"></div>
                </div>

                <div class="action-buttons hidden" id="action-buttons">
                    <button class="btn-primary" id="download-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Download Fixed CSV
                    </button>
                    <button class="btn-secondary" id="reset-btn">Fix Another File</button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
